<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check-Raise Bluff Calculator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1419;
    --bg-card: #1a2028;
    --bg-input: #0a0e12;
    --border: #2a323d;
    --border-strong: #3a4452;
    --text: #e8eaed;
    --text-muted: #8a929e;
    --accent: #00d68f;
    --accent-glow: rgba(0, 214, 143, 0.15);
    --danger: #ff6b6b;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: radial-gradient(ellipse at top, #1a2028 0%, #0f1419 50%, #080b0e 100%);
    min-height: 100vh;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    line-height: 1.5;
  }

  .container {
    width: 100%;
    max-width: 460px;
  }

  .header {
    text-align: center;
    margin-bottom: 28px;
  }

  .suit-icons {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 14px;
  }

  .suit {
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .suit.red { color: #ff5757; }
  .suit.black { color: #d8dde5; }

  h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.3px;
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 13px;
    color: var(--text-muted);
  }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 16px;
  }

  .input-group {
    margin-bottom: 20px;
  }

  .input-group:last-child {
    margin-bottom: 0;
  }

  .input-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .label {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .value {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    background: var(--bg-input);
    padding: 4px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    min-width: 70px;
    text-align: center;
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 6px;
    background: var(--bg-input);
    border-radius: 3px;
    outline: none;
    border: 1px solid var(--border);
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: 3px solid var(--bg-card);
    box-shadow: 0 0 0 1px var(--accent), 0 0 12px var(--accent-glow);
    transition: transform 0.15s;
  }

  input[type="range"]::-webkit-slider-thumb:hover {
    transform: scale(1.15);
  }

  input[type="range"]::-moz-range-thumb {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: 3px solid var(--bg-card);
    box-shadow: 0 0 0 1px var(--accent), 0 0 12px var(--accent-glow);
  }

  .result-card {
    background: linear-gradient(135deg, #1a2028 0%, #1f2731 100%);
    border: 1px solid var(--border-strong);
    border-radius: 16px;
    padding: 32px 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .result-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.5;
  }

  .result-label {
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin-bottom: 12px;
    font-weight: 500;
  }

  .result-value {
    font-size: 56px;
    font-weight: 700;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
    line-height: 1;
    text-shadow: 0 0 30px var(--accent-glow);
    letter-spacing: -1.5px;
  }

  .result-hint {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 12px;
  }

  .formula {
    margin-top: 20px;
    padding: 12px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: 'SF Mono', Menlo, Consolas, monospace;
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
    letter-spacing: 0.3px;
  }

  .formula span {
    color: var(--accent);
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="suit-icons">
      <div class="suit black">♠</div>
      <div class="suit red">♥</div>
      <div class="suit red">♦</div>
      <div class="suit black">♣</div>
    </div>
    <h1>Check-Raise Bluff</h1>
    <div class="subtitle">Минимальный fold % для +EV блефа</div>
  </div>

  <div class="card">
    <div class="input-group">
      <div class="input-row">
        <span class="label">Cbet size</span>
        <span class="value" id="cbet-out">0.50</span>
      </div>
      <input type="range" min="0.1" max="2" value="0.5" step="0.01" id="cbet"/>
    </div>

    <div class="input-group">
      <div class="input-row">
        <span class="label">Raise size</span>
        <span class="value" id="raise-out">3.0×</span>
      </div>
      <input type="range" min="2" max="6" value="3" step="0.1" id="raise"/>
    </div>
  </div>

  <div class="result-card">
    <div class="result-label">Минимальный fold</div>
    <div class="result-value" id="min-fold">—</div>
    <div class="result-hint">для безубыточного блефа</div>

    <div class="formula">
      fold% = (<span>cbet</span> × <span>raise</span>) / (<span>cbet</span> × <span>raise</span> + 1 + <span>cbet</span>)
    </div>
  </div>

</div>

<script>
(function(){
  const $ = id => document.getElementById(id);

  function calc(){
    const cbet = parseFloat($('cbet').value);
    const raise = parseFloat($('raise').value);

    $('cbet-out').textContent = cbet.toFixed(2);
    $('raise-out').textContent = raise.toFixed(1) + '×';

    const minFold = (cbet * raise) / (cbet * raise + 1 + cbet);
    $('min-fold').textContent = (minFold * 100).toFixed(1) + '%';
  }

  ['cbet','raise'].forEach(id => $(id).addEventListener('input', calc));
  calc();
})();
</script>
</body>
</html>
